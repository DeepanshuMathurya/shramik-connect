<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozgaar Connect</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="text-xl font-black tracking-wide flex items-center gap-2">
                <i class="fa-solid fa-briefcase"></i> ROZGAAR
            </a>
            {% if session.get('user_id') %}
            <div class="flex items-center gap-4">
                <span class="text-xs bg-blue-700 px-2 py-1 rounded font-bold uppercase">{{ session.get('role') }}</span>
                <a href="/logout" class="text-sm font-semibold text-blue-100 hover:text-white"><i class="fa-solid fa-right-from-bracket text-lg"></i></a>
            </div>
            {% endif %}
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 pb-24">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="p-3 mb-4 text-sm font-bold rounded-lg {% if category == 'success' %}bg-green-100 text-green-800{% else %}bg-red-100 text-red-800{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
