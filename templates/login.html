{% extends 'base.html' %}
{% block content %}
<div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mt-8">
    <h2 class="text-2xl font-black mb-6 text-center text-slate-800">Login to Connect</h2>
    <form action="/login" method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Email Address</label>
            <input type="email" name="email" required class="w-full p-3 rounded-xl border-2 border-slate-200 outline-none focus:border-blue-500">
        </div>
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Password</label>
            <input type="password" name="password" required class="w-full p-3 rounded-xl border-2 border-slate-200 outline-none focus:border-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold p-4 rounded-xl shadow-md hover:bg-blue-700 transition">Log In</button>
    </form>
    <p class="text-center mt-4 text-sm font-medium text-slate-600">New to platform? <a href="/register" class="text-blue-600 font-bold">Register here</a></p>
</div>
{% endblock %}
